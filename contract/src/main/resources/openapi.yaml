openapi: 3.0.3
info:
  title: C15Tour API
  version: 0.0.1
  description: API minimale pour initialisation.

paths:
  /ping:
    get:
      summary: Health Check
      operationId: ping
      tags:
        - System
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /tours:
    post:
      summary: Create a new tour
      operationId: createTour
      tags:
        - Tours
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TourCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Get all tours
      operationId: getAllTours
      tags:
        - Tours
      responses:
        '200':
          description: List of tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TourResponse'
  /tours/{id}:
    get:
      summary: Get a tour by ID
      operationId: getTourById
      tags:
        - Tours
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Tour found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'
        '404':
          description: Tour not found

    put:
      summary: Update a tour by ID
      operationId: updateTour
      tags:
        - Tours
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TourCreateRequest'
      responses:
        '200':
          description: Tour updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'
        '404':
          description: Tour not found

    delete:
      summary: Delete a tour by ID
      operationId: deleteTour
      tags:
        - Tours
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Tour deleted
        '404':
          description: Tour not found
  /tours/share/{code}:
    get:
      summary: Get a tour by share code
      operationId: getTourByShareCode
      tags:
        - Tours
      parameters:
        - name: code
          in: path
          required: true
          description: "6character unique share code"
          schema:
            type: string
      responses:
        '200':
          description: Tour found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TourResponse'
        '404':
          description: Tour not found

  /tours/{id}/route-to-start:
    post:
      summary: Get route from current location to the start of the tour
      operationId: getRouteToStart
      tags:
        - TourCalculation
      parameters:
        - name: id
          in: path
          required: true
          description: "ID du tour"
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPositionRequest'
      responses:
        '200':
          description: Route calculated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteToStartResponse'
        '404':
          description: Tour not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Coordinates:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 47.218371
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: -1.553621

    Message:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: "Pong"

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Invalid input data"

    Waypoints:
      type: object
      required:
        - name
        - coordinates
      properties:
        name:
          type: string
          example: "Etape 1"
        coordinates:
          $ref: "#/components/schemas/Coordinates"

    SegmentRequest:
      type: object
      required:
        - name
        - waypoints
      properties:
        name:
          type: string
          example: "Segment 1"
        waypoints:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/Waypoints"

    SegmentResponse:
      type: object
      required:
        - name
        - distance
        - duration
        - geometry
        - waypoints
      properties:
        name:
          type: string
          example: "Segment 1"
        distance:
          type: integer
          format: int64
          description: Total distance in meters
          example: 256340
        duration:
          type: integer
          format: int64
          description: Total duration in seconds
          example: 4248
        geometry:
          type: string
          description: Geometry of the OSRM Response on type JSON
        steps:
          type: string
          description: List of navigation steps and maneuvers (JSON string)
        waypoints:
          type: array
          description: List of the points which compose the segment
          items:
            $ref: "#/components/schemas/Waypoints"

    TourCreateRequest:
      type: object
      required:
        - name
        - segments
      properties:
        name:
          type: string
          example: "Roadtrip Nantes"
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SegmentRequest'

    TourResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Roadtrip Nantes"
        shareCode:
          type: string
          example: "C15ROC"
        totalDistance:
          type: integer
          description: Total distance of the tour in meters
          example: 50
        totalDuration:
          type: integer
          description: Total duration of the tour in seconds
          example: 3852
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T12:00:00Z"
          description: Tour creation date and time
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SegmentResponse'

    UserPositionRequest:
      type: object
      required:
        - coordinates
      properties:
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    RouteToStartResponse:
      type: object
      required:
        - distance
        - duration
        - geometry
      properties:
        distance:
          type: integer
          format: int64
          description: Distance en mètres depuis la position actuelle jusqu'au début du tour
          example: 5000
        duration:
          type: integer
          format: int64
          description: Durée en secondes depuis la position actuelle jusqu'au début du tour
          example: 600
        geometry:
          type: string
          description: Geometry de la route au format JSON (OSRM)
        steps:
          type: string
          description: List des étapes de navigation (JSON string)
        startPoint:
          $ref: '#/components/schemas/Waypoints'