services:
  # La Base de données
  postgres:
    image: postgres:16-alpine
    container_name: c15tour-db
    environment:
      POSTGRES_DB: c15tourdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5433" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: c15tour-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@c15tour.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: